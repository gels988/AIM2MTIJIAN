<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>赞助捐赠 · AIM2M</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0a0a0e;
        color: #e5e7eb;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Arial, "Noto Sans", "Liberation Sans", sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 720px;
        border-radius: 16px;
        border: 1px solid rgba(229, 231, 235, 0.12);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.12),
          0 0 60px rgba(14, 165, 233, 0.12);
        padding: 20px;
      }
      .title {
        font-weight: 700;
        letter-spacing: 0.2px;
        font-size: 20px;
        margin: 0 0 10px;
        background: linear-gradient(90deg, #7c3aed, #0ea5e9, #fbbf24);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .muted {
        color: rgba(229, 231, 235, 0.7);
        font-size: 14px;
        line-height: 1.65;
        margin: 0 0 14px;
      }
      .addr {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        border-radius: 12px;
        border: 1px solid rgba(251, 191, 36, 0.22);
        background: rgba(0, 0, 0, 0.35);
        padding: 12px;
        word-break: break-all;
      }
      .btn {
        margin-top: 14px;
        width: 100%;
        height: 44px;
        border-radius: 12px;
        border: 1px solid rgba(251, 191, 36, 0.35);
        background: rgba(10, 10, 14, 0.7);
        color: #e5e7eb;
        font-weight: 700;
        cursor: pointer;
      }
      .btn:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">💖 赞助捐赠 · AIM2M</h1>
        <p class="muted">
          赞助将用于维持系统运行与“商业秘密防护”持续迭代。复制地址后在钱包中完成转账即可。
        </p>
        <div class="addr" id="addr">
          0xf3ce1bb32dcfb11e81c69efa0cc6f5ae7bd00f80
        </div>
        <button
          class="btn"
          onclick="navigator.clipboard.writeText(document.getElementById('addr').textContent.trim()).then(()=>{this.textContent='已复制 ✅'; setTimeout(()=>this.textContent='复制地址',1200);}).catch(()=>{})"
        >
          复制地址
        </button>
      </div>
    </div>
  </body>
</html>
